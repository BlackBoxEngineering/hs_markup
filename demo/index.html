<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>hs_markup demo</title>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    #editor { border: 1px solid #ccc; min-height: 120px; padding: .75rem; border-radius: 4px; }
    #editor [data-tag="b"]    { font-weight: bold; }
    #editor [data-tag="i"]    { font-style: italic; }
    #editor [data-tag="u"]    { text-decoration: underline; }
    #editor [data-tag="s"]    { text-decoration: line-through; }
    #editor [data-tag="t"]    { font-size: 1.4em; font-weight: bold; }
    #editor [data-tag="h1"]   { font-size: 2em; font-weight: bold; display: block; }
    #editor [data-tag="h2"]   { font-size: 1.5em; font-weight: bold; display: block; }
    #editor [data-tag="h3"]   { font-size: 1.17em; font-weight: bold; display: block; }
    #editor [data-tag="code"] { display: block; font-family: monospace; background: #f4f4f4; padding: .5em .75em; white-space: pre; overflow-x: auto; border-radius: 4px; }
    #editor [data-tag="q"]    { border-left: 3px solid #ccc; padding-left: .75em; color: #555; display: block; }
    #output { margin-top: 1rem; background: #f9f9f9; padding: .75rem; border-radius: 4px; white-space: pre-wrap; font-family: monospace; font-size: .9em; }
    .toolbar { display: flex; gap: .5rem; margin-bottom: .5rem; flex-wrap: wrap; }
    button { padding: .25rem .6rem; cursor: pointer; }
  </style>
</head>
<body>
  <h2>hs_markup demo</h2>
  <div class="toolbar">
    <button type="button" onmousedown="toolbarFmt(event, 'b')"><b>B</b></button>
    <button type="button" onmousedown="toolbarFmt(event, 'i')"><i>I</i></button>
    <button type="button" onmousedown="toolbarFmt(event, 'u')"><u>U</u></button>
    <button type="button" onmousedown="toolbarFmt(event, 's')"><s>S</s></button>
    <button type="button" onmousedown="toolbarFmt(event, 't')">T</button>
    <button type="button" onmousedown="toolbarFmt(event, 'h1')">H1</button>
    <button type="button" onmousedown="toolbarFmt(event, 'h2')">H2</button>
    <button type="button" onmousedown="toolbarFmt(event, 'code')">Code</button>
    <button type="button" onmousedown="toolbarFmt(event, 'q')">Quote</button>
    <label for="codeLang" style="display:inline-flex;align-items:center;gap:.35rem;font-size:.9em;">
      Lang
      <select id="codeLang">
        <option value="">none</option>
        <option value="js">js</option>
        <option value="ts">ts</option>
        <option value="sol">sol</option>
        <option value="py">py</option>
        <option value="sh">sh</option>
        <option value="json">json</option>
      </select>
    </label>
  </div>
  <div id="editor" contenteditable="true"></div>
  <div id="output"></div>

  <script>
    const editor = document.getElementById('editor');
    const output = document.getElementById('output');
    const codeLang = document.getElementById('codeLang');
    let savedRange = null;

    const BLOCK_BREAK_TAGS = new Set(['DIV', 'P', 'LI']);

    function nodeToMarkup(node, isRoot = false) {
      if (node.nodeType === Node.TEXT_NODE) return node.textContent;
      if (node.tagName === 'BR') return '\n';
      if (node.nodeType !== Node.ELEMENT_NODE) return '';
      const tag = node.dataset && node.dataset.tag;
      const children = Array.from(node.childNodes)
        .map(child => nodeToMarkup(child))
        .join('');
      if (tag) {
        const lg = tag === 'code' && node.dataset && node.dataset.lg ? ` lg=${node.dataset.lg}` : '';
        return `[${tag}${lg}]${children}[/${tag}]`;
      }
      if (!isRoot && BLOCK_BREAK_TAGS.has(node.tagName)) return `${children}\n`;
      return children;
    }

    function extractTextPreserving(node) {
      if (node.nodeType === Node.TEXT_NODE) return node.textContent;
      if (node.nodeType === Node.DOCUMENT_FRAGMENT_NODE) {
        return Array.from(node.childNodes).map(extractTextPreserving).join('');
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return '';
      if (node.tagName === 'BR') return '\n';
      const children = Array.from(node.childNodes).map(extractTextPreserving).join('');
      return BLOCK_BREAK_TAGS.has(node.tagName) ? `${children}\n` : children;
    }

    function toolbarFmt(e, tag) {
      e.preventDefault();
      restoreSelection();
      fmt(tag);
    }

    function saveSelection() {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;
      const range = sel.getRangeAt(0);
      if (!editor.contains(range.commonAncestorContainer)) return;
      savedRange = range.cloneRange();
    }

    function restoreSelection() {
      if (!savedRange) return;
      const sel = window.getSelection();
      if (!sel) return;
      sel.removeAllRanges();
      sel.addRange(savedRange);
    }

    function fmt(tag) {
      const sel = window.getSelection();
      const sourceRange = savedRange
        ? savedRange.cloneRange()
        : (sel && sel.rangeCount ? sel.getRangeAt(0).cloneRange() : null);
      if (!sourceRange) return;
      if (!editor.contains(sourceRange.commonAncestorContainer)) return;
      if (sourceRange.collapsed) return;

      const text = tag === 'code'
        ? extractTextPreserving(sourceRange.cloneContents())
        : sourceRange.toString();
      if (!text) return;

      const range = sourceRange;
      const span = document.createElement('span');
      span.dataset.tag = tag;
      if (tag === 'code') {
        const lg = codeLang && codeLang.value ? codeLang.value : '';
        if (lg) span.dataset.lg = lg;
        span.setAttribute('spellcheck', 'false');
        span.setAttribute('autocorrect', 'off');
        span.setAttribute('autocapitalize', 'off');
        span.setAttribute('autocomplete', 'off');
      }
      span.textContent = text;
      range.deleteContents();
      range.insertNode(span);
      const after = document.createRange();
      after.selectNodeContents(span);
      sel.removeAllRanges();
      sel.addRange(after);
      savedRange = after.cloneRange();
      sync();
    }

    function sync() {
      output.textContent = nodeToMarkup(editor, true);
    }

    editor.addEventListener('input', sync);
    editor.addEventListener('mouseup', saveSelection);
    editor.addEventListener('keyup', saveSelection);
    document.addEventListener('selectionchange', saveSelection);
    editor.addEventListener('paste', e => {
      e.preventDefault();
      const text = e.clipboardData.getData('text/plain');
      document.execCommand('insertText', false, text);
    });

    // seed
    editor.innerHTML = '<span data-tag="t">Hello World</span><br>Type and select text, then click a format button.';
    sync();
  </script>
</body>
</html>
