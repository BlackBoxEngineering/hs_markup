<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>hs_markup demo</title>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    #editor { border: 1px solid #ccc; min-height: 120px; padding: .75rem; border-radius: 4px; }
    #editor [data-tag="b"]    { font-weight: bold; }
    #editor [data-tag="i"]    { font-style: italic; }
    #editor [data-tag="u"]    { text-decoration: underline; }
    #editor [data-tag="s"]    { text-decoration: line-through; }
    #editor [data-tag="t"]    { font-size: 1.4em; font-weight: bold; }
    #editor [data-tag="h1"]   { font-size: 2em; font-weight: bold; display: block; }
    #editor [data-tag="h2"]   { font-size: 1.5em; font-weight: bold; display: block; }
    #editor [data-tag="h3"]   { font-size: 1.17em; font-weight: bold; display: block; }
    #editor [data-tag="code"] { font-family: monospace; background: #f4f4f4; padding: 0 .25em; }
    #editor [data-tag="q"]    { border-left: 3px solid #ccc; padding-left: .75em; color: #555; display: block; }
    #output { margin-top: 1rem; background: #f9f9f9; padding: .75rem; border-radius: 4px; white-space: pre-wrap; font-family: monospace; font-size: .9em; }
    .toolbar { display: flex; gap: .5rem; margin-bottom: .5rem; flex-wrap: wrap; }
    button { padding: .25rem .6rem; cursor: pointer; }
  </style>
</head>
<body>
  <h2>hs_markup demo</h2>
  <div class="toolbar">
    <button onclick="fmt('b')"><b>B</b></button>
    <button onclick="fmt('i')"><i>I</i></button>
    <button onclick="fmt('u')"><u>U</u></button>
    <button onclick="fmt('s')"><s>S</s></button>
    <button onclick="fmt('t')">T</button>
    <button onclick="fmt('h1')">H1</button>
    <button onclick="fmt('h2')">H2</button>
    <button onclick="fmt('code')">Code</button>
    <button onclick="fmt('q')">Quote</button>
  </div>
  <div id="editor" contenteditable="true"></div>
  <div id="output"></div>

  <script>
    const editor = document.getElementById('editor');
    const output = document.getElementById('output');

    function nodeToMarkup(node) {
      if (node.nodeType === Node.TEXT_NODE) return node.textContent;
      if (node.tagName === 'BR') return '\n';
      const tag = node.dataset && node.dataset.tag;
      const children = Array.from(node.childNodes).map(nodeToMarkup).join('');
      return tag ? `[${tag}]${children}[/${tag}]` : children;
    }

    function fmt(tag) {
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed) return;
      const range = sel.getRangeAt(0);
      const text = range.toString();
      if (!text) return;
      const span = document.createElement('span');
      span.dataset.tag = tag;
      span.textContent = text;
      range.deleteContents();
      range.insertNode(span);
      sync();
    }

    function sync() {
      output.textContent = nodeToMarkup(editor);
    }

    editor.addEventListener('input', sync);
    editor.addEventListener('paste', e => {
      e.preventDefault();
      const text = e.clipboardData.getData('text/plain');
      document.execCommand('insertText', false, text);
    });

    // seed
    editor.innerHTML = '<span data-tag="t">Hello World</span><br>Type and select text, then click a format button.';
    sync();
  </script>
</body>
</html>
